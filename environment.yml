name: visnet-rt
channels:
  - pytorch
  - rdkit
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - rdkit
  - numpy
  - scikit-learn
  - matplotlib
  - tqdm
  - pip
  - pip:
    - torch==2.7.1+cu118
    - torchvision==0.22.1+cu118
    - torchaudio==2.7.1+cu118
    - torch-scatter -f https://data.pyg.org/whl/torch-2.7.0+cu118.html
    - torch-sparse -f https://data.pyg.org/whl/torch-2.7.0+cu118.html
    - torch-cluster -f https://data.pyg.org/whl/torch-2.7.0+cu118.html
    - torch-spline-conv -f https://data.pyg.org/whl/torch-2.7.0+cu118.html
    - torch-geometric